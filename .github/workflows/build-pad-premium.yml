name: Build Bushido Power Pad Premium

on:
  workflow_dispatch:
  push:
    branches:
      - esp32-s3-power-pad

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ESP-IDF version
        run: |
          . /opt/esp/idf/export.sh
          idf.py --version

      - name: Set target
        run: |
          . /opt/esp/idf/export.sh
          idf.py set-target esp32s3

      - name: Reconfigure
        run: |
          . /opt/esp/idf/export.sh
          idf.py reconfigure

      - name: Build
        run: |
          . /opt/esp/idf/export.sh
          idf.py build

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp build/*.bin artifacts/ || true
          cp build/*.elf artifacts/ || true
          cp build/*.map artifacts/ || true
          cp build/flasher_args.json artifacts/ || true
          cp build/project_description.json artifacts/ || true
          cp partitions.csv artifacts/ || true
          ls -la artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bushido-power-pad-esp32s3
          path: artifacts/
